spring.application.name=auth-service
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/plasmit_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Aman@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# No Hibernate / No JPA
# spring.jpa.* remove kar do because JPA dependency use hi nahi kar rahe

jwt.secret=PlasmitSaasJwtSecretKeyForAuthenticationServiceMinimumLength256Bits
jwt.access-token-expiration-ms=86400000
